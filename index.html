<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Escolar</title>

<style>
body{
  font-family: Arial;
  margin:0;
  text-align: center;
}

#login{
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("./imagens/bts.jpg");
  background-size: cover;
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#login h2{color:white;}

#app{
  display:none;
  padding:20px;
  background:linear-gradient(135deg,#7b2cbf,#c77dff);
  min-height:100vh;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.materia{
  background:white;
  padding:10px;
  border-radius:10px;
}

textarea{width:100%;height:70px;}

button{
  margin:5px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#7b2cbf;
  color:white;
}
</style>

</head>

<body>

<div id="login">
  <h2>🔐 Mochila Escolar</h2>
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="entrar()">Entrar</button>
  <p id="erro"></p>
</div>

<div id="app">

<h1>🎒 Mochila</h1>

<button onclick="exportarDados()">💾 Backup</button>

<h3>📅 Provas</h3>
<input id="provaMateria" placeholder="Matéria">
<input type="date" id="provaData">
<button onclick="addProva()">Adicionar</button>
<ul id="listaProvas"></ul>

<h3>📊 Notas</h3>
<input id="notaMateria" placeholder="Matéria">
<input id="notaValor" type="number">
<button onclick="addNota()">Adicionar</button>
<ul id="listaNotas"></ul>

<h2>📚 Matérias</h2>
<div class="container" id="materias"></div>

</div>

<script>
const senhaCorreta="jungkook";

function entrar(){
  let senha=document.getElementById("senha").value;
  if(senha===senhaCorreta){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    carregarMaterias();
  }else{
    document.getElementById("erro").innerText="Senha incorreta";
  }
}

function carregarMaterias(){
  let container=document.getElementById("materias");
  container.innerHTML="";

  const materiasPadrao=[
    "Português","Matemática","Física","Química","Biologia",
    "História","Geografia","Inglês","Educação Física",
    "Filosofia","Sociologia",
    "Programação","Banco de Dados","Redes",
    "Sistemas Operacionais","Desenvolvimento Web",
    "Algoritmos","Projeto Técnico","Eletrônica",
    "Automação","Empreendedorismo","Segurança da Informação","UX/UI"
  ];

  for(let i=1;i<=23;i++){
    let nome=localStorage.getItem("nome"+i)||materiasPadrao[i-1];
    let texto=localStorage.getItem("texto"+i)||"";

    container.innerHTML+=`
    <div class="materia">
      <input value="${nome}" onchange="salvarNome(${i},this.value)">
      <textarea onkeyup="salvarTexto(${i},this.value)">${texto}</textarea>

```
  <input id="tarefa${i}" placeholder="Nova tarefa">
  <button onclick="addTarefa(${i})">Add</button>
  <ul id="lista${i}"></ul>
</div>`;
```

}

carregarTarefas();
carregarProvas();
carregarNotas();
}

function salvarNome(i,v){localStorage.setItem("nome"+i,v);}
function salvarTexto(i,v){localStorage.setItem("texto"+i,v);}

function addTarefa(i){
let input=document.getElementById("tarefa"+i);
let tarefas=JSON.parse(localStorage.getItem("tarefas"+i)||"[]");
tarefas.push(input.value);
localStorage.setItem("tarefas"+i,JSON.stringify(tarefas));
input.value="";
carregarTarefas();
}

function carregarTarefas(){
for(let i=1;i<=23;i++){
let lista=document.getElementById("lista"+i);
if(!lista)continue;
lista.innerHTML="";
let tarefas=JSON.parse(localStorage.getItem("tarefas"+i)||"[]");
tarefas.forEach(t=>lista.innerHTML+=`<li>${t}</li>`);
}
}

function addProva(){
let m=provaMateria.value;
let d=provaData.value;
let provas=JSON.parse(localStorage.getItem("provas")||"[]");
provas.push(m+" - "+d);
localStorage.setItem("provas",JSON.stringify(provas));
carregarProvas();
}

function carregarProvas(){
listaProvas.innerHTML="";
let provas=JSON.parse(localStorage.getItem("provas")||"[]");
provas.forEach(p=>listaProvas.innerHTML+=`<li>${p}</li>`);
}

function addNota(){
let m=notaMateria.value;
let v=notaValor.value;
let notas=JSON.parse(localStorage.getItem("notas")||"[]");
notas.push(m+" - "+v);
localStorage.setItem("notas",JSON.stringify(notas));
carregarNotas();
}

function carregarNotas(){
listaNotas.innerHTML="";
let notas=JSON.parse(localStorage.getItem("notas")||"[]");
notas.forEach(n=>listaNotas.innerHTML+=`<li>${n}</li>`);
}

function exportarDados(){
let dados=JSON.stringify(localStorage);
let blob=new Blob([dados],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="backup.json";
a.click();
} </script>

</body>
</html>
