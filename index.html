<script>
const senhaCorreta="jungkook";

function entrar(){
  let senhaInput = document.getElementById("senha");
  let senha = senhaInput.value.trim();

  if(senha === senhaCorreta){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    carregarMaterias();
  } else {
    document.getElementById("erro").innerText = "Senha incorreta";
  }
}

// resto do código continua igual 👇

function carregarMaterias(){
  let container=document.getElementById("materias");
  container.innerHTML="";

  const materiasPadrao=[
    "Português","Matemática","Física","Química","Biologia",
    "História","Geografia","Inglês","Educação Física",
    "Filosofia","Sociologia",
    "Programação","Banco de Dados","Redes",
    "Sistemas Operacionais","Desenvolvimento Web",
    "Algoritmos","Projeto Técnico","Eletrônica",
    "Automação","Empreendedorismo","Segurança da Informação","UX/UI"
  ];

  for(let i=1;i<=23;i++){
    let nome=localStorage.getItem("nome"+i)||materiasPadrao[i-1];
    let texto=localStorage.getItem("texto"+i)||"";

    container.innerHTML+=`
    <div class="materia">
      <input value="${nome}" onchange="salvarNome(${i},this.value)">
      <textarea onkeyup="salvarTexto(${i},this.value)">${texto}</textarea>

```
  <input id="tarefa${i}" placeholder="Nova tarefa">
  <button onclick="addTarefa(${i})">Add</button>
  <ul id="lista${i}"></ul>
</div>`;
```

}

carregarTarefas();
carregarProvas();
carregarNotas();
}

function salvarNome(i,v){localStorage.setItem("nome"+i,v);}
function salvarTexto(i,v){localStorage.setItem("texto"+i,v);}

function addTarefa(i){
let input=document.getElementById("tarefa"+i);
if(input.value==="") return;

let tarefas=JSON.parse(localStorage.getItem("tarefas"+i)||"[]");
tarefas.push(input.value);
localStorage.setItem("tarefas"+i,JSON.stringify(tarefas));
input.value="";
carregarTarefas();
}

function carregarTarefas(){
for(let i=1;i<=23;i++){
let lista=document.getElementById("lista"+i);
if(!lista)continue;
lista.innerHTML="";
let tarefas=JSON.parse(localStorage.getItem("tarefas"+i)||"[]");
tarefas.forEach(t=>lista.innerHTML+=`<li>${t}</li>`);
}
}

function addProva(){
let m=document.getElementById("provaMateria").value;
let d=document.getElementById("provaData").value;
if(!m || !d) return;

let provas=JSON.parse(localStorage.getItem("provas")||"[]");
provas.push(m+" - "+d);
localStorage.setItem("provas",JSON.stringify(provas));

document.getElementById("provaMateria").value="";
document.getElementById("provaData").value="";
carregarProvas();
}

function carregarProvas(){
let lista=document.getElementById("listaProvas");
lista.innerHTML="";
let provas=JSON.parse(localStorage.getItem("provas")||"[]");
provas.forEach(p=>lista.innerHTML+=`<li>${p}</li>`);
}

function addNota(){
let m=document.getElementById("notaMateria").value;
let v=document.getElementById("notaValor").value;
if(!m || !v) return;

let notas=JSON.parse(localStorage.getItem("notas")||"[]");
notas.push(m+" - "+v);
localStorage.setItem("notas",JSON.stringify(notas));

document.getElementById("notaMateria").value="";
document.getElementById("notaValor").value="";
carregarNotas();
}

function carregarNotas(){
let lista=document.getElementById("listaNotas");
lista.innerHTML="";
let notas=JSON.parse(localStorage.getItem("notas")||"[]");
notas.forEach(n=>lista.innerHTML+=`<li>${n}</li>`);
}

function exportarDados(){
let dados=JSON.stringify(localStorage);
let blob=new Blob([dados],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="backup.json";
a.click();
} </script>
